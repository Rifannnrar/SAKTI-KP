services:
  # ─── Application ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: sakti_app
    restart: unless-stopped
    environment:
      APP_NAME: SAKTI
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY}

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-sakti}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}

      CACHE_STORE: redis
      SESSION_DRIVER: redis
      SESSION_ENCRYPT: true
      SESSION_SECURE_COOKIE: true
      SESSION_SAME_SITE: lax
      QUEUE_CONNECTION: redis
      FORTIFY_REGISTRATION: false

      REDIS_HOST: redis
      REDIS_PORT: 6379

      FILESYSTEM_DISK: local
    volumes:
      - storage_data:/var/www/html/storage/app/public
      - logs_data:/var/www/html/storage/logs
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sakti_network

  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sakti_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sakti}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-sakti}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sakti_network

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sakti_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sakti_network

volumes:
  postgres_data:
  redis_data:
  storage_data:
  logs_data:

networks:
  sakti_network:
    driver: bridge
